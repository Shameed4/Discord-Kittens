<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Button Counter</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f7f6;
            color: #333;
        }
        
        .control-panel {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 30px;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            width: 350px;
        }

        .input-group {
            display: flex;
            gap: 10px;
        }

        input[type="text"] {
            flex-grow: 1;
            padding: 10px;
            font-size: 1rem;
            border: 1px solid #ccc;
            border-radius: 6px;
        }

        button.sm-btn {
            padding: 10px 15px;
            font-size: 1rem;
            cursor: pointer;
            border: none;
            border-radius: 6px;
            color: white;
            transition: background-color 0.2s;
        }

        .btn-primary { background-color: #007bff; }
        .btn-primary:hover { background-color: #0056b3; }
        
        .btn-secondary { background-color: #6c757d; }
        .btn-secondary:hover { background-color: #5a6268; }

        .lobby-info {
            text-align: center;
            margin-bottom: 20px;
        }
        .lobby-info h2 { margin: 0 0 5px 0; color: #333; }
        .lobby-info p { margin: 0; color: #666; font-size: 1.1rem; }
        .highlight { color: #007bff; font-weight: bold; }
        .error-text { color: #dc3545; font-size: 0.9rem; margin-top: 5px; min-height: 20px;}

        #counter {
            font-size: 6rem;
            font-weight: bold;
            color: #007bff;
            margin: 10px 0 30px 0;
        }
        
        #clickBtn {
            padding: 15px 40px;
            font-size: 1.5rem;
            cursor: pointer;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: all 0.2s ease;
        }
        #clickBtn:hover { transform: translateY(-2px); box-shadow: 0 6px 8px rgba(0,0,0,0.15); }
        #clickBtn:disabled { background-color: #ccc; cursor: not-allowed; transform: none; box-shadow: none; }
    </style>
</head>
<body>

    <div class="control-panel">
        <div class="input-group">
            <input type="text" id="createInput" placeholder="New lobby name...">
            <button id="createBtn" class="sm-btn btn-primary">Create</button>
        </div>
        <div class="input-group">
            <input type="text" id="joinInput" placeholder="Existing lobby name...">
            <button id="joinBtn" class="sm-btn btn-secondary">Join</button>
        </div>
        <div id="statusMessage" class="error-text"></div>
    </div>

    <div class="lobby-info">
        <h2>Room: <span id="lobbyNameDisplay" class="highlight">Not Connected</span></h2>
        <p>Players Active: <span id="playerCount" class="highlight">0</span></p>
    </div>

    <div id="counter">0</div>
    <button id="clickBtn" disabled>Click Me!</button>

    <script>
        let ws;
        
        const counterDisplay = document.getElementById('counter');
        const clickBtn = document.getElementById('clickBtn');
        const createInput = document.getElementById('createInput');
        const joinInput = document.getElementById('joinInput');
        const createBtn = document.getElementById('createBtn');
        const joinBtn = document.getElementById('joinBtn');
        const lobbyNameDisplay = document.getElementById('lobbyNameDisplay');
        const playerCount = document.getElementById('playerCount');
        const statusMessage = document.getElementById('statusMessage');

        function showStatus(message, isError = true) {
            statusMessage.textContent = message;
            statusMessage.style.color = isError ? '#dc3545' : '#28a745';
            setTimeout(() => { statusMessage.textContent = ''; }, 4000);
        }

        // --- HTTP Phase: Create the Lobby ---
        async function createLobby(name) {
            try {
                const response = await fetch('/api/lobbies', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: name })
                });

                if (response.status === 201) {
                    showStatus('Lobby created! Joining...', false);
                    connectToLobby(name); // Automatically join after creating
                } else if (response.status === 409) {
                    showStatus('Lobby already exists. Try joining it.');
                } else {
                    showStatus('Failed to create lobby.');
                }
            } catch (err) {
                showStatus('Network error while creating lobby.');
            }
        }

        // --- WebSocket Phase: Join the Game Loop ---
        function connectToLobby(lobbyName) {
            if (ws) ws.close();

            lobbyNameDisplay.textContent = 'Connecting...';
            clickBtn.disabled = true;

            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/ws?lobby=${encodeURIComponent(lobbyName)}`;
            
            ws = new WebSocket(wsUrl);
            
            ws.onopen = () => {
                lobbyNameDisplay.textContent = lobbyName;
                clickBtn.disabled = false;
            };

            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    counterDisplay.textContent = data.counter;
                    playerCount.textContent = data.players;
                } catch (e) {
                    console.error("Failed to parse JSON:", e);
                }
            };
            
            ws.onclose = (event) => {
                // If it closes immediately, it likely got rejected by our 404 guard in Go
                if (lobbyNameDisplay.textContent === 'Connecting...') {
                    lobbyNameDisplay.textContent = 'Not Connected';
                    showStatus(`Could not join '${lobbyName}'. Does it exist?`);
                } else {
                    lobbyNameDisplay.textContent = 'Disconnected';
                }
                counterDisplay.textContent = "0";
                playerCount.textContent = "0";
                clickBtn.disabled = true;
            };
        }

        // Button Event Listeners
        createBtn.addEventListener('click', () => {
            const name = createInput.value.trim();
            if (name) createLobby(name);
        });

        joinBtn.addEventListener('click', () => {
            const name = joinInput.value.trim();
            if (name) connectToLobby(name);
        });

        clickBtn.addEventListener('click', () => {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send('click'); 
            }
        });
    </script>

</body>
</html>
